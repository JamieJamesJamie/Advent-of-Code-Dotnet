name: Dotnet

on:
  pull_request:
    branches: [main]

jobs:
  format:
    runs-on: ubuntu-latest

    permissions:
      # Give the default GITHUB_TOKEN write permission to commit and push the
      # added or changed files to the repository.
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GIT_AUTO_COMMIT_ACTION_CHECKOUT_PAT }}

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0

      - run: dotnet format style

      - run: dotnet format analyzers

      - run: dotnet tool restore

      - run: dotnet csharpier format .

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # File containing the version Spec of the version to use.  Examples: package.json, .nvmrc, .node-version, .tool-versions.
          # If node-version and node-version-file are both provided the action will use version from node-version.
          node-version-file: ".nvmrc"
          # Used to specify a package manager for caching in the default directory. Supported values: npm, yarn, pnpm.
          # Package manager should be pre-installed
          # Default: ''
          cache: "npm"

      - run: npm ci

      - run: npx prettier . --write

      - name: Verify Changed files
        uses: tj-actions/verify-changed-files@a1c6acee9df209257a246f2cc6ae8cb6581c1edf # v20.0.4
        id: verify-changed-files

      - name: Fail job if any files changed
        if: steps.verify-changed-files.outputs.files_changed == 'true'
        run: exit 1

      - uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        if: success() || failure()
        with:
          commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          commit_message: "chore(pre-commit): apply automatic changes"

  csharpier:
    needs: format

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0

      - run: dotnet tool restore

      - run: dotnet csharpier check .

  dotnet-format:
    needs: format

    runs-on: ubuntu-latest

    strategy:
      matrix:
        subcommand: ["style", "analyzers"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0

      - run: dotnet format ${{ matrix.subcommand }} --verify-no-changes

  prettier:
    needs: format

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # File containing the version Spec of the version to use.  Examples: package.json, .nvmrc, .node-version, .tool-versions.
          # If node-version and node-version-file are both provided the action will use version from node-version.
          node-version-file: ".nvmrc"
          # Used to specify a package manager for caching in the default directory. Supported values: npm, yarn, pnpm.
          # Package manager should be pre-installed
          # Default: ''
          cache: "npm"

      - run: npm ci

      - run: npx prettier . --check

  test-shared:
    needs: [format, csharpier, dotnet-format, prettier]

    runs-on: ubuntu-latest

    env:
      TEST_DIRECTORY: test/Common/AdventOfCode.Common.Test
      TEST_PROJECT: AdventOfCode.Common.Test.csproj

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0

      - name: Enable Automated Test Report Artifact Upload
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);

      - run: dotnet restore --locked-mode ${{ env.TEST_DIRECTORY }}/${{ env.TEST_PROJECT }}

      - run: dotnet run --no-restore --project ${{ env.TEST_DIRECTORY }}/${{ env.TEST_PROJECT }} --configuration Release

  test-year:
    needs: [format, csharpier, dotnet-format, prettier]

    runs-on: ubuntu-latest

    strategy:
      matrix:
        project-year: ["2015", "2018", "2019", "2022", "2023", "2024"]

    env:
      TEST_DIRECTORY: test/Solvers/AdventOfCode.Y${{ matrix.project-year }}.Test
      TEST_PROJECT: AdventOfCode.Y${{ matrix.project-year }}.Test.csproj

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0

      - name: Enable Automated Test Report Artifact Upload
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);

      - run: dotnet restore --locked-mode ${{ env.TEST_DIRECTORY }}/${{ env.TEST_PROJECT }}

      - run: dotnet run --no-restore --project ${{ env.TEST_DIRECTORY }}/${{ env.TEST_PROJECT }} --configuration Release
